<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;

const SAN_ROOMS={'가2D':{cap:3150},'가2A':{cap:1200},'가2B':{cap:750},'가2C':{cap:1050},'나1A':{cap:1050},'나1B':{cap:750},'나1C':{cap:750}};
const SAN_RO=['가2D','가2A','가2B','가2C','나1A','나1B','나1C'];
const WD=['일','월','화','수','목','금','토'];
const HIST_INIT=window.__HIST__||[];
const BR_INIT=window.__BR__||[];

const fmt=n=>Number(n).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}(${WD[dt.getDay()]})`;}
function fmtMD(d){return d?d.slice(5).replace('-','/'):'—';}
function dday(ds){const now=new Date();now.setHours(0,0,0,0);const t=new Date(ds+'T00:00:00');const diff=Math.round((t-now)/86400000);if(diff<0)return{txt:'완료',cls:'dd-ft'};if(diff===0)return{txt:'오늘',cls:'dd-td'};if(diff<=3)return{txt:`D-${diff}일`,cls:'dd-nr'};if(diff<=7)return{txt:`D-${diff}일`,cls:'dd-sn'};return{txt:`D-${diff}일`,cls:'dd-ft'};}
function normType(t){if(t==='사육')return '선별';if(t==='폐기')return '산란폐기';return t;}

function calcSanSt(entries){
  const s={};
  for(const r of SAN_RO){
    const cap=SAN_ROOMS[r].cap;
    const re=entries.filter(e=>e.room===r);
    const san=re.filter(e=>normType(e.type)==='산란').reduce((a,e)=>a+e.amount,0);
    const sel=re.filter(e=>normType(e.type)==='선별').reduce((a,e)=>a+e.amount,0);
    const peg=re.filter(e=>normType(e.type)==='산란폐기').reduce((a,e)=>a+e.amount,0);
    const occ=Math.max(0,san-sel-peg);
    s[r]={cap,occ,avail:Math.max(0,cap-occ),rate:cap>0?Math.round(occ/cap*100):0};
  }
  return s;
}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap;';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// Firebase helpers
function fbPush(path,val){return firebase.database().ref(path).push(val);}
function fbRemove(path){return firebase.database().ref(path).remove();}
function fbUpdate(path,val){return firebase.database().ref(path).update(val);}

// ── SanCard ──
function SanCard({room,st,big}){
  const pct=st.rate;
  const c=pct<50?'ok':pct<75?'go':pct<90?'wn':'dg';
  const label=pct<50?'여유':pct<75?'보통':pct<90?'주의':'가득';
  return(
    <div className={`rc san-rc${big?' rc-big':''}`}>
      <div className="rc-top">
        <span className="rc-name">{room}</span>
        <span className={`badge b-${c}`}>세팅 {pct}%</span>
      </div>
      <div className="bar-bg"><div className={`bar-fill bar-${c}`} style={{width:`${Math.min(100,pct)}%`}}/></div>
      <div className="rc-stats">
        <div><div className="rc-sl">현재세팅</div><b className="rc-sv sv-occ">{fmt(st.occ)}</b></div>
        <div><div className="rc-sl">여유</div><b className={`rc-sv${st.avail<200?' sv-low':''}`}>{fmt(st.avail)}</b></div>
        <div style={{marginLeft:'auto',textAlign:'right'}}>
          <div className="rc-sl rc-total">총 {fmt(st.cap)}</div>

        </div>
      </div>
    </div>
  );
}

// ── AdminModal ──
function AdminModal({onClose,onSuccess}){
  const [mode,setMode]=useState('login');
  const [pw,setPw]=useState('');
  const [np1,setNp1]=useState('');
  const [np2,setNp2]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [loading,setLoading]=useState(false);

  function doLogin(){
    if(!pw){setErr('비밀번호를 입력해주세요');return;}
    setLoading(true);
    setTimeout(()=>{
      if(pw===window.ADMIN_PW){onSuccess();}
      else{setErr('비밀번호가 틀렸습니다');setLoading(false);}
    },300);
  }
  function doChange(){
    if(pw!==window.ADMIN_PW){setErr('현재 비밀번호가 틀렸습니다');return;}
    if(np1.length<4){setErr('새 비밀번호는 4자 이상이어야 해요');return;}
    if(np1!==np2){setErr('새 비밀번호가 일치하지 않아요');return;}
    window.ADMIN_PW=np1;
    try{firebase.database().ref('config/adminPw').set(np1);}catch(e){}
    setOk('✅ 비밀번호가 변경되었습니다');setErr('');
    setTimeout(()=>onClose(),1500);
  }

  const inp={width:'100%',padding:'14px 16px',fontSize:17,border:'2px solid var(--bd)',borderRadius:10,outline:'none',background:'var(--bg)',color:'var(--tx)',fontFamily:'inherit',boxSizing:'border-box',marginBottom:12};
  const inpFocus={...inp,borderColor:'var(--san)'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:20}} onClick={onClose}>
      <div style={{background:'var(--sf)',borderRadius:20,padding:'36px 28px',width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
        {mode==='login'?(<>
          <div style={{fontSize:26,fontWeight:900,marginBottom:6,color:'var(--tx)'}}>🔐 관리자 로그인</div>
          <div style={{fontSize:14,color:'var(--tx2)',marginBottom:24}}>비밀번호를 입력해 주세요</div>
          {err&&<div style={{background:'var(--rd-bg)',color:'var(--rd-t)',padding:'12px 14px',borderRadius:10,marginBottom:14,fontSize:14,fontWeight:600}}>⚠️ {err}</div>}
          <input style={inp} type="password" placeholder="비밀번호" value={pw} autoFocus
            onChange={e=>{setPw(e.target.value);setErr('');}}
            onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
          <button style={{width:'100%',padding:'16px',fontSize:17,fontWeight:800,borderRadius:12,border:'none',cursor:'pointer',background:'var(--san)',color:'white',marginBottom:10,fontFamily:'inherit'}}
            onClick={doLogin} disabled={loading}>{loading?'확인 중...':'로그인'}</button>
          <button style={{width:'100%',padding:'12px',fontSize:14,fontWeight:600,borderRadius:12,border:'2px solid var(--bd)',cursor:'pointer',background:'transparent',color:'var(--tx2)',fontFamily:'inherit'}}
            onClick={()=>{setMode('change');setErr('');setPw('');}}>🔑 비밀번호 변경</button>
        </>):(<>
          <div style={{fontSize:26,fontWeight:900,marginBottom:6,color:'var(--tx)'}}>🔑 비밀번호 변경</div>
          <div style={{fontSize:14,color:'var(--tx2)',marginBottom:24}}>현재 비밀번호 확인 후 새 비밀번호를 설정합니다</div>
          {err&&<div style={{background:'var(--rd-bg)',color:'var(--rd-t)',padding:'12px 14px',borderRadius:10,marginBottom:14,fontSize:14,fontWeight:600}}>⚠️ {err}</div>}
          {ok&&<div style={{background:'var(--san-h)',color:'var(--san-t)',padding:'12px 14px',borderRadius:10,marginBottom:14,fontSize:14,fontWeight:600}}>{ok}</div>}
          <div style={{fontSize:13,color:'var(--tx2)',marginBottom:6,fontWeight:600}}>현재 비밀번호</div>
          <input style={inp} type="password" placeholder="현재 비밀번호" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&document.getElementById('np1in')?.focus()}/>
          <div style={{fontSize:13,color:'var(--tx2)',marginBottom:6,fontWeight:600}}>새 비밀번호 (4자 이상)</div>
          <input id="np1in" style={inp} type="password" placeholder="새 비밀번호" value={np1} onChange={e=>{setNp1(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&document.getElementById('np2in')?.focus()}/>
          <div style={{fontSize:13,color:'var(--tx2)',marginBottom:6,fontWeight:600}}>새 비밀번호 확인</div>
          <input id="np2in" style={inp} type="password" placeholder="새 비밀번호 확인" value={np2} onChange={e=>{setNp2(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&doChange()}/>
          <button style={{width:'100%',padding:'16px',fontSize:17,fontWeight:800,borderRadius:12,border:'none',cursor:'pointer',background:'var(--san)',color:'white',marginBottom:10,fontFamily:'inherit'}} onClick={doChange}>변경 완료</button>
          <button style={{width:'100%',padding:'12px',fontSize:14,fontWeight:600,borderRadius:12,border:'2px solid var(--bd)',cursor:'pointer',background:'transparent',color:'var(--tx2)',fontFamily:'inherit'}} onClick={()=>{setMode('login');setErr('');}}>← 로그인으로</button>
        </>)}
      </div>
    </div>
  );
}

// ── EditModal ──
function EditModal({entry,onSave,onClose}){
  const [date,setDate]=useState(entry.date);
  const [room,setRoom]=useState(entry.room);
  const [type,setType]=useState(entry.type);
  const [amount,setAmount]=useState(String(entry.amount));
  const [err,setErr]=useState('');
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}} onClick={onClose}>
      <div style={{background:'var(--sf)',borderRadius:16,padding:'24px',width:'100%',maxWidth:360}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>✏️ 기록 수정</div>
        <label className="lbl">날짜</label>
        <input className="dinp" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <label className="lbl">룸</label>
        <div className="rbtns">{SAN_RO.map(r=><button key={r} className={`rbtn${room===r?' s-san':''}`} onClick={()=>setRoom(r)}>{r}</button>)}</div>

        <div className="tbtns">{[['산란','ti-egg','s-san'],['사육','ti-share','s-sel'],['폐기','ti-trash','s-peg']].map(([t,ic,cls])=>(
          <button key={t} className={`tbtn${type===t?' '+cls:''}`} onClick={()=>setType(t)}><i className={`ti ${ic}`}/>{t==='산란'?'산란세팅':t==='사육'?'선별이동':'산란폐기'}</button>
        ))}</div>

        </div>

          {sel>0&&<div style={{width:Math.min(selR,100)+'%',background:'var(--sel)',transition:'width .5s'}}/>}
          {peg>0&&<div style={{width:Math.min(pegR,100-selR)+'%',background:'var(--peg)'}}/>}

// ── BatchRates 주별 선별율 ──
function BatchRates({entries}){
  const td=today();

  // 1. 분산세팅 감지
  const dateRooms={};
  entries.forEach(e=>{if(normType(e.type)!=='산란')return;if(!dateRooms[e.date])dateRooms[e.date]=[];if(!dateRooms[e.date].includes(e.room))dateRooms[e.date].push(e.room);});

  // 2. 배치 그룹 구성
  const sanGrp={};
  entries.forEach(e=>{
    if(normType(e.type)!=='산란')return;
    const rooms=dateRooms[e.date];const mg=rooms.length>1;
    const k=mg?'M_'+e.date:e.date+'_'+e.room;
    if(!sanGrp[k])sanGrp[k]={date:e.date,room:mg?rooms.slice().sort().join('+'):e.room,rooms,merged:mg,san:0};
    sanGrp[k].san+=e.amount;
  });

  // 3. 핵심 규칙: "산란 후 4주차에 진행된 선별은 4주 전 배치에서 차감"
  //    각 선별/폐기를 목표 30.5일(1차29+2차32일 중간값)에 가장 가까운 배치 하나에만 귀속
  //    유효범위: 산란 후 25~42일 (4주차 ±1주)
  const batchSels={};
  const batchPegs={};
  Object.keys(sanGrp).forEach(k=>{batchSels[k]=[];batchPegs[k]=[];});

  entries.filter(e=>normType(e.type)==='선별').sort((a,b)=>a.date.localeCompare(b.date))
    .forEach(s=>{
      let bk=null,bs=999;
      Object.entries(sanGrp).forEach(([k,g])=>{
        const rm=g.merged?g.rooms.includes(s.room):s.room===g.room;if(!rm)return;
        const d=(new Date(s.date)-new Date(g.date))/86400000;
        if(d<25||d>42)return;
        const sc=Math.abs(d-30.5);if(sc<bs){bs=sc;bk=k;}
      });
      if(bk)batchSels[bk].push({date:s.date,amount:s.amount});
    });

  entries.filter(e=>normType(e.type)==='산란폐기').sort((a,b)=>a.date.localeCompare(b.date))
    .forEach(p=>{
      let bk=null,bs=999;
      Object.entries(sanGrp).forEach(([k,g])=>{
        const rm=g.merged?g.rooms.includes(p.room):p.room===g.room;if(!rm)return;
        const d=(new Date(p.date)-new Date(g.date))/86400000;
        if(d<25||d>90)return;
        const sc=Math.abs(d-30.5);if(sc<bs){bs=sc;bk=k;}
      });
      if(bk)batchPegs[bk].push({date:p.date,amount:p.amount});
    });

  // 4. 1차/2차 분리: 첫 선별일 기준 +4일 이내=1차, 이후=2차
  function getSel(k){
    const sels=batchSels[k].slice().sort((a,b)=>a.date.localeCompare(b.date));
    const pegs=batchPegs[k].slice();
    if(!sels.length)return{s1:0,s2:0,peg:pegs.reduce((a,p)=>a+p.amount,0)};
    const fd=sels[0].date;
    let s1=0,s2=0;
    sels.forEach(s=>{
      const d=(new Date(s.date)-new Date(fd))/86400000;
      if(d<=4){s1+=s.amount;}else{s2+=s.amount;}
    });
    return{s1,s2,peg:pegs.reduce((a,p)=>a+p.amount,0)};
  }

  const oneYearAgo=addDays(td,-365);
  const rows=Object.values(sanGrp).filter(g=>g.date>=oneYearAgo).sort((a,b)=>b.date.localeCompare(a.date));
  const colW='55px 1.2fr 62px 65px 65px 60px 58px';

  return(
    <div className="card" style={{marginBottom:10}}>
      <div className="card-hdr">
        <span>🌱 배치별 산란 → 선별율</span>
        <span style={{fontSize:11,color:'var(--tx2)'}}>4주차 화/금 기준</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:colW,gap:2,padding:'5px 4px',background:'var(--san-h)',borderRadius:'var(--rs)',marginBottom:3,fontSize:10,fontWeight:700,color:'var(--san-t)'}}>
        <span>세팅일</span><span>룸</span>
        <span style={{textAlign:'right'}}>세팅수</span>
        <span style={{textAlign:'right',color:'var(--sel-t)'}}>1차선별</span>
        <span style={{textAlign:'right',color:'var(--sel-t)'}}>2차선별</span>
        <span style={{textAlign:'right',color:'var(--peg-t)'}}>폐기</span>
        <span style={{textAlign:'center'}}>선별율</span>
      </div>
      {rows.map((g,i)=>{
        const k=g.merged?'M_'+g.date:g.date+'_'+g.room;
        const {s1,s2,peg}=getSel(k);
        const tot=s1+s2;
        const done=addDays(g.date,40)<td;
        const sr=g.san>0&&tot>0?Math.round(tot/g.san*100):null;
        const srCls=sr===null?'sr-wait':sr>=50?'sr-ok':sr>=30?'sr-warn':'sr-bad';
        return(
          <div key={i} style={{display:'grid',gridTemplateColumns:colW,gap:2,padding:'6px 4px',borderBottom:'1px solid var(--bd)',background:i%2===0?'transparent':'var(--sf2)',alignItems:'center',fontSize:12}}>
            <span style={{fontSize:10,color:'var(--tx2)'}}>{g.date.slice(5)}</span>
            <span style={{fontWeight:700,color:g.merged?'var(--sak-t)':'var(--san-t)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>{g.room}</span>
            <span style={{textAlign:'right',fontWeight:600}}>{g.san.toLocaleString()}</span>
            <span style={{textAlign:'right',color:s1>0?'var(--sel-t)':'var(--tx3)'}}>{s1>0?s1.toLocaleString():'—'}</span>
            <span style={{textAlign:'right',color:s2>0?'var(--sel-t)':'var(--tx3)'}}>{s2>0?s2.toLocaleString():'—'}</span>
            <span style={{textAlign:'right',color:peg>0?'var(--peg-t)':'var(--tx3)'}}>{peg>0?peg.toLocaleString():'—'}</span>
            <span className={srCls}>{sr!==null?sr+'%':done?'—':'대기'}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── 메인 앱 ──
function App(){
  const [entries,setEntries]=useState(HIST_INIT);
  const [fbConn,setFbConn]=useState(false);
  const [isAdmin,setIsAdmin]=useState(()=>localStorage.getItem('db_admin')==='1');
  const [showAdminModal,setShowAdminModal]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [tab,setTab]=useState(()=>localStorage.getItem('db_tab')||'dash');
  const [hf,setHf]=useState('전체');
  const [hr,setHr]=useState('');
  const [histView,setHistView]=useState('all');
  const [form,setForm]=useState({date:today(),room:'가2D',type:'산란',amount:''});
  const [exporting,setExporting]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    if(typeof firebase==='undefined')return;
    try{
      const ref=firebase.database().ref('entries_v2');
      unsubRef.current=ref;
      ref.on('value',snap=>{
        const val=snap.val();
        if(val){
          const arr=Object.entries(val).map(([id,v])=>({...v,id})).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
          setEntries(arr);
        }else{
          doUpload(HIST_INIT);
        }
        setFbConn(true);
      });
      firebase.database().ref('config/adminPw').once('value').then(snap=>{if(snap.val())window.ADMIN_PW=snap.val();});
    }catch(e){console.error(e);}
    return()=>{if(unsubRef.current)unsubRef.current.off();};
  },[]);

  function doUpload(data){
    if(typeof firebase==='undefined')return;
    const obj={};data.forEach(e=>{const {id,...rest}=e;obj[id]=rest;});
    firebase.database().ref('entries_v2').set(obj);
    localStorage.setItem('db_hist_v','5');
  }

  const sanSt=useMemo(()=>calcSanSt(entries),[entries]);
  const totalSanAvail=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].avail,0),[sanSt]);
  const totalSanCap=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].cap,0),[sanSt]);
  const totalSanOcc=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].occ,0),[sanSt]);

  // 최근 3개월 통계
  const cutoff3m=useMemo(()=>{const d=new Date();d.setMonth(d.getMonth()-3);return d.toISOString().slice(0,10);},[]);
  const recentEntries=useMemo(()=>entries.filter(e=>e.date>=cutoff3m),[entries,cutoff3m]);
  const stat3m=useMemo(()=>{
    const san=recentEntries.filter(e=>normType(e.type)==='산란').reduce((s,e)=>s+e.amount,0);
    const sel=recentEntries.filter(e=>normType(e.type)==='선별').reduce((s,e)=>s+e.amount,0);
    const peg=recentEntries.filter(e=>normType(e.type)==='산란폐기').reduce((s,e)=>s+e.amount,0);
    const selR=san>0?Math.round(sel/san*100):0;
    const pegR=san>0?Math.round(peg/san*100):0;
    return{san,sel,peg,selR,pegR};
  },[recentEntries]);

  // 월별 통계 (그래프)
  const monthlyStats=useMemo(()=>{
    const m={};
    entries.forEach(e=>{
      const mo=e.date.slice(0,7);
      if(!m[mo])m[mo]={month:mo,산란:0,선별:0,산란폐기:0};
      const t=normType(e.type);
      m[mo][t]=(m[mo][t]||0)+e.amount;
    });
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month));
  },[entries]);
  const maxStat=useMemo(()=>Math.max(...monthlyStats.map(m=>Math.max(m.산란||0,m.선별||0)),1),[monthlyStats]);

  // 일정
  const selSchedule=useMemo(()=>{
    const grp={};
    entries.forEach(e=>{if(normType(e.type)!=='산란')return;const k=`${e.date}_${e.room}`;if(!grp[k])grp[k]={date:e.date,room:e.room,amount:0};grp[k].amount+=e.amount;});
    const td=today();
    return Object.values(grp).filter(g=>addDays(g.date,35)>=td).sort((a,b)=>b.date.localeCompare(a.date)).map(g=>{
      const s1=addDays(g.date,29);const s2=addDays(g.date,32);

      return{...g,s1,s2,done:selDone>0};
    });
  },[entries]);

  // 입력 처리
  async function submitEntry(){
    if(!isAdmin){showToast('관리자 로그인 후 입력 가능');return;}
    if(!form.amount||Number(form.amount)<=0){showToast('수량을 입력해주세요');return;}

        {tab==='dash'&&(
          <div className="room-layout">
            <div style={{background:'#1B4332',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:4,boxShadow:'0 1px 6px rgba(0,0,0,.18)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',color:'white'}}>
                <div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.65)',marginBottom:3}}>세팅 {fmt(totalSanOcc)} / {fmt(totalSanCap)}</div>
                  <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                    <span style={{fontSize:13,color:'rgba(255,255,255,.75)'}}>여유 <b style={{fontSize:16,color:'#86EFAC',fontWeight:800}}>{fmt(totalSanAvail)}</b></span>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.65)',marginBottom:2}}>세팅율</div>
                  <div style={{fontSize:26,fontWeight:900,lineHeight:1}}>{totalSanCap>0?Math.round(totalSanOcc/totalSanCap*100):0}<span style={{fontSize:14,fontWeight:400}}>%</span></div>
                </div>
              </div>
              <div style={{marginTop:8,background:'rgba(255,255,255,.12)',borderRadius:3,height:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:'#86EFAC',width:totalSanCap>0?Math.round(totalSanOcc/totalSanCap*100)+'%':'0%',transition:'width .5s'}}/>
              </div>
            </div>
            <SanCard room="가2D" st={sanSt['가2D']} big={true}/>
            <div className="room-sub">
              {['가2A','가2B','가2C','나1A','나1B','나1C'].map(r=><SanCard key={r} room={r} st={sanSt[r]}/>)}
            </div>
          </div>
        )}

        {/* ── 입력 ── */}
        {tab==='input'&&(<>
          {!isAdmin&&<div className="readonly-box"><i className="ti ti-lock"/> 관리자 로그인 후 입력 가능</div>}
          <label className="lbl">날짜</label>
          <input type="date" className="dinp" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          <label className="lbl">산란실 룸 (숫자=여유)</label>
          <div className="rbtns">
            {SAN_RO.map(r=>{
              const av=sanSt[r].avail;
              const sel=form.room===r;
              return(<button key={r} className={`rbtn${sel?(r.startsWith('나')?' s-na':' s-san'):''}`} onClick={()=>setForm(f=>({...f,room:r}))}>
                {r}<div className="sub">{fmt(av)}</div>
              </button>);
            })}
          </div>
          <label className="lbl">종류</label>
          <div className="tbtns">
            {[['산란','ti-egg','s-san','산란세팅'],['사육','ti-share','s-sel','선별이동'],['폐기','ti-trash','s-peg','산란폐기']].map(([t,ic,cls,lbl])=>(
              <button key={t} className={`tbtn${form.type===t?' '+cls:''}`} onClick={()=>setForm(f=>({...f,type:t}))}>
                <i className={`ti ${ic}`}/>{lbl}
              </button>
            ))}
          </div>
          <label className="lbl">수량 (마릿수)</label>
          <input type="number" className="ainp" placeholder="예: 500" value={form.amount} min={1}
            onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
            onKeyDown={e=>e.key==='Enter'&&submitEntry()}/>
          <div className="prev-box">
            <div className="prev-r"><span>룸</span><span>{form.room}</span></div>
            <div className="prev-r"><span>종류</span><span>{typeLabel(form.type)}</span></div>
            <div className="prev-r"><span>수량</span><span>{form.amount?fmt(Number(form.amount)):'—'}</span></div>
            <div className="prev-r"><span>날짜</span><span>{form.date}</span></div>
          </div>
          <button className="sbtn san" disabled={!isAdmin} onClick={submitEntry}><i className="ti ti-check"/> 입력 완료</button>
        </>)}

        {/* ── 일정 ── */}
        {tab==='sched'&&(<>
          {selSchedule.length===0
            ?<div className="empty"><i className="ti ti-calendar-off"/>예정된 일정 없음</div>
            :selSchedule.map((s,i)=>{
              const d1=dday(s.s1),d2=dday(s.s2);
              return(
                <div key={i} className={`si${s.done?' si-done':''}`}>
                  <div className="si-h">
                    <div><div className="si-n">{s.room}</div><div className="si-m">산란 {fmtDate(s.date)} · {fmt(s.amount)}마리</div></div>
                    {s.done?<span className="badge b-go">완료</span>:<span className={`badge b-${d1.cls==='dd-td'?'dg':d1.cls==='dd-nr'?'tg':d1.cls==='dd-sn'?'wn':'go'}`}>{d1.txt}</span>}
                  </div>
                  <div className="si-dates">
                    <div className="si-db"><div className="si-dl">① 1차 선별 (+29일 화)</div><div className="si-dv">{fmtDate(s.s1)}</div><div className={`si-dd ${d1.cls}`}>{s.done?'완료':d1.txt}</div></div>
                    <div className="si-db"><div className="si-dl">② 2차 선별 (+32일 금)</div><div className="si-dv">{fmtDate(s.s2)}</div><div className={`si-dd ${d2.cls}`}>{s.done?'완료':d2.txt}</div></div>
                  </div>
                  {!s.done&&isAdmin&&<button className="si-ib" onClick={()=>{setForm({date:s.s1,room:s.room,type:'사육',amount:''});setTab('input');localStorage.setItem('db_tab','input');}}><i className="ti ti-plus" style={{fontSize:14}}/>선별 입력하기</button>}
                </div>
              );
            })}
        </>)}

        {/* ── 통계 ── */}
        {tab==='stat'&&(<>
          <button className="exp-btn" onClick={doExport}>
            <i className="ti ti-file-spreadsheet" style={{fontSize:22,color:'#16A34A'}}/>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:800,fontSize:15}}>엑셀 보고서 내보내기</div>
              <div style={{fontSize:12,color:'var(--tx2)'}}>현황요약 · 배치선별율 · 전체이력 · 월별통계 (4개 시트)</div>
            </div>
            <i className="ti ti-download" style={{fontSize:18,color:'var(--tx2)'}}/>
          </button>

          <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:'var(--r)',padding:'14px',marginBottom:12,boxShadow:'var(--sh)'}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--tx2)',marginBottom:10}}>📊 최근 3개월 실적 ({cutoff3m.slice(5)} ~ 현재)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
              <div style={{textAlign:'center',padding:'10px 6px',background:'var(--san-h)',borderRadius:8}}>
                <div style={{fontSize:11,color:'var(--san-t)',fontWeight:700,marginBottom:4}}>총 산란</div>
                <div style={{fontSize:20,fontWeight:900,color:'var(--san-t)'}}>{fmt(stat3m.san)}</div>
              </div>
              <div style={{textAlign:'center',padding:'10px 6px',background:'var(--sel-bg)',borderRadius:8}}>
                <div style={{fontSize:11,color:'var(--sel-t)',fontWeight:700,marginBottom:4}}>총 선별</div>
                <div style={{fontSize:20,fontWeight:900,color:'var(--sel-t)'}}>{fmt(stat3m.sel)}</div>
                <div style={{fontSize:12,color:'var(--sel-t)',fontWeight:600}}>{stat3m.selR}%</div>
              </div>
              <div style={{textAlign:'center',padding:'10px 6px',background:'var(--peg-bg)',borderRadius:8}}>
                <div style={{fontSize:11,color:'var(--peg-t)',fontWeight:700,marginBottom:4}}>총 폐기</div>
                <div style={{fontSize:20,fontWeight:900,color:'var(--peg-t)'}}>{fmt(stat3m.peg)}</div>
                <div style={{fontSize:12,color:'var(--peg-t)',fontWeight:600}}>{stat3m.pegR}%</div>
              </div>
            </div>
          </div>

          <div className="card" style={{marginBottom:10}}>
            <div className="card-hdr">산란세팅 월별</div>
            <div className="leg">
              <div className="leg-i"><div className="leg-b" style={{background:'var(--san)'}}/>산란</div>
              <div className="leg-i"><div className="leg-b" style={{background:'var(--sel)'}}/>선별</div>
            </div>
            <div className="chart-wrap"><div className="chart-area">
              {monthlyStats.map(m=>(
                <div key={m.month} className="chart-col">
                  <div className="chart-bars">
                    {[['산란','var(--san)'],['선별','var(--sel)']].map(([t,c])=>(
                      <div key={t} className="chart-bar" title={`${m.month} ${t}: ${fmt(m[t]||0)}`}
                        style={{height:Math.round((m[t]||0)/maxStat*94)+3+'px',background:c}}/>
                    ))}
                  </div>
                  <div className="chart-x">{m.month.slice(5)}</div>
                </div>
              ))}
            </div></div>
          </div>

          <BatchRates entries={entries}/>
        </>)}

        {/* ── 이력 ── */}
        {tab==='hist'&&(<>
          <div className="tab-inner" style={{marginBottom:10}}>
            <button className={`ti-btn${histView==='all'?' on-san':''}`} onClick={()=>setHistView('all')}>📋 전체이력</button>
            <button className={`ti-btn${histView==='batch'?' on-san':''}`} onClick={()=>setHistView('batch')}>📊 배치현황</button>
          </div>

          {histView==='batch'&&<SanBatchView entries={entries}/>}

          {histView==='all'&&(<>
            <div className="fbar">
              {['전체','산란','선별','폐기'].map(t=><button key={t} className={`fbtn${hf===t?' on':''}`} onClick={()=>setHf(t)}>{t}</button>)}
              <span style={{padding:'0 3px',color:'var(--tx3)'}}>|</span>
              {['전체',...SAN_RO].map(r=><button key={r} className={`fbtn${hr===(r==='전체'?'':r)?' on':''}`} onClick={()=>setHr(r==='전체'?'':r)}>{r}</button>)}
            </div>
            <div className="cn">최근 1년 {filtEntries.length}건 표시 (전체 {entries.length}건)</div>
            {filtEntries.map(e=>(
              <div key={e.id} className="hi">
                <span className="hi-dt">{e.date.slice(5)}</span>
                <span className="hi-rm">{e.room}</span>
                <span className={`hi-b ${typeBadge(e.type)}`}>{typeLabel(e.type)}</span>
                <span className="hi-a">{fmt(e.amount)}</span>
                {isAdmin&&<><button className="edit-btn" onClick={()=>setEditEntry(e)}><i className="ti ti-pencil"/></button><button className="del" onClick={()=>delEntry(e.id)}><i className="ti ti-x"/></button></>}
              </div>
            ))}
          </>)}
        </>)}

      </div>

      {/* 탭 */}
      <div className="tabs">
        {TABS.map(([t,ic,lbl])=>(
          <button key={t} className={`tab${tab===t?' on':''}`} onClick={()=>{setTab(t);localStorage.setItem('db_tab',t);}}>
            <i className={`ti ${ic}`}/>{lbl}
          </button>
        ))}
      </div>
    </div>
  );
}

try{ReactDOM.createRoot(document.getElementById('root')).render(<App/>);}
catch(err){document.getElementById('root').innerHTML='<div style="padding:20px;color:red;font-size:13px;font-family:monospace">오류: '+err.message+'</div>';console.error(err);}

</script>
</body>
</html>
