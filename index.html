<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F0F4F8;--sf:#FFF;--sf2:#F1F3F5;--bd:#E2E8F0;--bd2:#CBD5E1;--tx:#1E293B;--tx2:#64748B;--tx3:#94A3B8;--r:12px;--rs:8px;--sh:0 1px 4px rgba(0,0,0,.08);--san:#16A34A;--san-bg:#F0FDF4;--san-t:#14532D;--san-h:#DCFCE7;--sak:#7C3AED;--sak-bg:#F5F3FF;--sak-t:#4C1D95;--sak-h:#EDE9FE;--sel:#2563EB;--sel-bg:#EFF6FF;--sel-t:#1E40AF;--peg:#EA580C;--peg-bg:#FFF7ED;--peg-t:#9A3412;--rd:#DC2626;--rd-bg:#FEE2E2;--rd-t:#991B1B;--am:#CA8A04;--am-bg:#FEF9C3;--am-t:#854D0E}
@media(prefers-color-scheme:dark){:root{--bg:#0F172A;--sf:#1E293B;--sf2:#334155;--bd:#334155;--bd2:#475569;--tx:#F1F5F9;--tx2:#94A3B8;--tx3:#64748B;--san-bg:#14532D;--san-t:#86EFAC;--san-h:#14532D;--sak-bg:#2E1065;--sak-t:#C4B5FD;--sak-h:#2E1065}}
body{font-family:'맑은 고딕','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px}
.app{max-width:560px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1E293B,#334155);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-t{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;color:white}
.hdr-s{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:6px}
.lock-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 12px;font-size:13px;color:white;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.admin-bar{background:linear-gradient(90deg,#7C3AED,#5B21B6);color:white;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:14px}
.admin-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-weight:700;display:flex;align-items:center;gap:4px}
.tabs{display:flex;background:var(--sf);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:50}
.tab{flex:1;padding:11px 2px 9px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:var(--tx2);font-family:inherit}
.tab.on{color:var(--san);font-weight:700}.tab i{font-size:22px}
.cont{flex:1;padding:14px;padding-bottom:80px}
.sec-hdr{border-radius:var(--r);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sec-hdr.san{background:linear-gradient(135deg,var(--san),#15803D);color:white}
.sec-hdr.sak{background:linear-gradient(135deg,var(--sak),#5B21B6);color:white}
.sec-hdr-t{font-size:17px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-hdr-s{font-size:13px;opacity:.85;margin-top:3px}
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.rc.main{grid-column:1/-1}.rc.clickable{cursor:pointer}
.rc.sak-card{border-left:3px solid var(--sak)}
.rc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rc-n{font-size:17px;font-weight:800}
.rc-dong{font-size:13px;color:var(--tx2);font-weight:400}
.rc-d{font-size:12px;color:var(--tx2);margin-top:2px}
.bar-bg{height:6px;background:var(--sf2);border-radius:3px;margin:0 0 10px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.rc-nums{font-size:15px;display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.rc-nums b{font-size:19px;font-weight:800}
.rc-total{font-size:12px;color:var(--tx3);margin-left:auto}
.rc-rate{font-size:13px;color:var(--tx2)}
.rc-rate b{font-size:15px}
.badge{font-size:12px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-ok{background:#DCFCE7;color:#166534}.b-go{background:#DBEAFE;color:#1E40AF}.b-wn{background:#FEF9C3;color:#854D0E}.b-tg{background:#FFEDD5;color:#9A3412}.b-dg{background:#FEE2E2;color:#991B1B}
.bar-ok{background:#16A34A}.bar-go{background:#2563EB}.bar-wn{background:#CA8A04}.bar-tg{background:#EA580C}.bar-dg{background:#DC2626}
.av-ok{color:#166534}.av-go{color:#1E40AF}.av-wn{color:#854D0E}.av-tg{color:#9A3412}.av-dg{color:#991B1B}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.seg-btn{padding:12px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);cursor:pointer;font-size:15px;font-weight:600;color:var(--tx2);text-align:center;font-family:inherit}
.seg-btn.on-san{background:var(--san-h);border-color:var(--san);color:var(--san-t)}
.seg-btn.on-sak{background:var(--sak-h);border-color:var(--sak);color:var(--sak-t)}
.lbl{font-size:14px;color:var(--tx2);margin-bottom:6px;display:block;font-weight:600}
.rbtns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.rbtn{padding:10px 3px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);text-align:center;font-family:inherit}
.rbtn .sub{font-size:11px;margin-top:2px;opacity:.7}
.rbtn.s-san{background:var(--san-h);border-color:var(--san);color:var(--san-t)}
.rbtn.s-sak{background:var(--sak-h);border-color:var(--sak);color:var(--sak-t)}
.rbtn.s-na{background:#DBEAFE;border-color:#2563EB;color:#1E40AF}
.tbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.tbtn{padding:13px 5px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit}
.tbtn i{font-size:22px}
.tbtn.s-san{background:var(--san-h);border-color:var(--san);color:var(--san-t)}
.tbtn.s-sel{background:var(--sel-bg);border-color:var(--sel);color:var(--sel-t)}
.tbtn.s-peg{background:var(--peg-bg);border-color:var(--peg);color:var(--peg-t)}
.tbtn.s-sak{background:var(--sak-h);border-color:var(--sak);color:var(--sak-t)}
.tbtn.s-out{background:#FFF7ED;border-color:#F59E0B;color:#78350F}
.ainp{width:100%;padding:14px;border:1.5px solid var(--bd2);border-radius:var(--rs);font-size:28px;font-weight:700;text-align:center;background:var(--sf);color:var(--tx);outline:none;margin-bottom:12px;font-family:inherit}
.ainp:focus{border-color:var(--san);box-shadow:0 0 0 3px rgba(22,163,74,.12)}
.dinp{width:100%;padding:12px 14px;border:1.5px solid var(--bd2);border-radius:var(--rs);font-size:16px;background:var(--sf);color:var(--tx);outline:none;margin-bottom:14px;font-family:inherit}
.pw-inp{width:100%;padding:13px;border:1.5px solid var(--bd2);border-radius:var(--rs);font-size:18px;background:var(--sf);color:var(--tx);outline:none;font-family:inherit;letter-spacing:4px}
.prev-box{background:var(--sf2);border-radius:var(--rs);padding:11px 14px;margin-bottom:12px;font-size:14px;border:1px solid var(--bd)}
.prev-r{display:flex;justify-content:space-between;padding:3px 0}
.sbtn{width:100%;padding:16px;border:none;border-radius:var(--r);color:white;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.sbtn.san{background:var(--san)}.sbtn.sak{background:var(--sak)}.sbtn:disabled{background:var(--tx3);cursor:not-allowed}
.readonly-box{background:var(--sel-bg);border:1px solid var(--sel);border-radius:var(--rs);padding:11px 14px;margin-bottom:12px;font-size:14px;color:var(--sel-t);display:flex;align-items:center;gap:7px}
.si{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.si.sak-si{border-left:3px solid var(--sak)}
.si-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.si-n{font-size:17px;font-weight:700}.si-m{font-size:13px;color:var(--tx2);margin-top:3px}
.si-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.si-db{background:var(--sf2);border-radius:var(--rs);padding:9px 11px;border:1px solid var(--bd)}
.si-dl{font-size:12px;color:var(--tx2);margin-bottom:3px;font-weight:500}.si-dv{font-size:15px;font-weight:700}
.si-dd{font-size:12px;margin-top:2px;font-weight:600}
.dd-td{color:var(--rd)}.dd-nr{color:var(--peg)}.dd-sn{color:#CA8A04}.dd-ft{color:var(--tx2)}.dd-ps{color:var(--tx3)}
.si-done{opacity:.4}
.si-ib{display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--sak-bg);border:1px solid var(--sak);border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--sak-t);margin-top:10px;font-family:inherit}
.past-t{text-align:center;padding:10px;font-size:14px;color:var(--tx2);cursor:pointer;border:1.5px dashed var(--bd2);border-radius:var(--rs);margin-top:6px;background:transparent;font-family:inherit;width:100%}
.tab-inner{display:flex;gap:8px;margin-bottom:14px}
.ti-btn{flex:1;padding:11px 6px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);cursor:pointer;font-size:14px;font-weight:600;color:var(--tx2);text-align:center;font-family:inherit}
.ti-btn.on-san{background:var(--san-h);border-color:var(--san);color:var(--san-t)}
.ti-btn.on-sak{background:var(--sak-h);border-color:var(--sak);color:var(--sak-t)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.stat-c{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 10px;text-align:center}
.stat-l{font-size:12px;color:var(--tx2);margin-bottom:3px}.stat-v{font-size:22px;font-weight:700}
.chart-wrap{overflow-x:auto;padding-bottom:4px}
.chart-area{display:flex;align-items:flex-end;padding:6px 2px 0;gap:4px;min-width:max-content}
.chart-col{display:flex;flex-direction:column;align-items:center}
.chart-bars{display:flex;align-items:flex-end;gap:2px;height:100px}
.chart-bar{border-radius:3px 3px 0 0;min-height:2px;width:12px}
.chart-x{font-size:10px;color:var(--tx2);margin-top:4px;white-space:nowrap}
.leg{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--tx2)}
.leg-b{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.exp-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sf);border:2px solid var(--san);border-radius:var(--r);cursor:pointer;color:var(--tx);margin-bottom:12px;width:100%;font-family:inherit}
.fbar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:3px}
.fbtn{padding:7px 13px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;color:var(--tx2);font-family:inherit}
.fbtn.on{background:var(--san);border-color:var(--san);color:white;font-weight:600}
.fbtn.on-sak{background:var(--sak);border-color:var(--sak);color:white;font-weight:600}
.hi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh)}
.hi.sak-hi{border-left:3px solid var(--sak)}
.hi-dt{font-size:13px;color:var(--tx2);min-width:46px}.hi-rm{font-size:14px;font-weight:700;min-width:34px}
.hi-b{font-size:12px;padding:3px 8px;border-radius:20px;font-weight:600;min-width:38px;text-align:center}
.b-san{background:var(--san-h);color:var(--san-t)}.b-sel{background:var(--sel-bg);color:var(--sel-t)}.b-peg{background:var(--peg-bg);color:var(--peg-t)}
.b-sak2{background:var(--sak-h);color:var(--sak-t)}.b-out{background:#FFF7ED;color:#78350F}.b-spg{background:#FEE2E2;color:#991B1B}
.hi-a{font-size:16px;font-weight:700;flex:1;text-align:right}
.del{background:none;border:none;cursor:pointer;color:var(--tx3);padding:4px;font-family:inherit;font-size:17px}
.del:hover{color:var(--rd)}
.edit-btn{background:none;border:none;cursor:pointer;color:var(--sel-t);padding:4px;font-family:inherit;font-size:17px;opacity:.8}
.empty{text-align:center;padding:40px 20px;color:var(--tx2)}
.empty i{font-size:48px;display:block;margin-bottom:12px;opacity:.3}
.cn{font-size:13px;color:var(--tx2);margin-bottom:9px}
.divider{height:1px;background:var(--bd);margin:10px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--sf);border-radius:var(--r);padding:24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-t{font-size:19px;font-weight:700;margin-bottom:6px}
.modal-s{font-size:14px;color:var(--tx2);margin-bottom:18px;line-height:1.55}
.modal-err{font-size:14px;color:var(--rd-t);background:var(--rd-bg);padding:8px 12px;border-radius:var(--rs);margin-bottom:12px}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.mbtn{padding:12px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--tx2)}
.mbtn.p-san{background:var(--san);border-color:var(--san);color:white}
.mbtn.p-sak{background:var(--sak);border-color:var(--sak);color:white}
.sak-room-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sak-rb{padding:13px 10px;border:1.5px solid var(--bd2);background:var(--sf);border-radius:var(--rs);cursor:pointer;text-align:center;font-family:inherit}
.sak-rb-n{font-size:15px;font-weight:700;color:var(--tx)}
.sak-rb-av{font-size:13px;color:var(--tx2);margin-top:3px}
.sak-rb.sel{background:var(--sak-h);border-color:var(--sak)}
.sak-rb.sel .sak-rb-n{color:var(--sak-t)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;display:inline-block;margin-left:5px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.sec-hdr{border-radius:var(--r);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sec-hdr.san{background:linear-gradient(135deg,#16A34A,#15803D);color:white}
.sec-hdr.sak{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:white}
.sec-hdr-t{font-size:17px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-hdr-s{font-size:13px;opacity:.85;margin-top:3px}
.readonly-box{background:#EFF6FF;border:1px solid #2563EB;border-radius:var(--rs);padding:11px 14px;margin-bottom:12px;font-size:14px;color:#1E40AF;display:flex;align-items:center;gap:7px}
.rc.san-rc{border-left:4px solid var(--san);padding-left:14px}
.rc.sak-rc{border-left:4px solid var(--sak);padding-left:14px}
.rc-n{font-size:18px;font-weight:800;color:var(--tx)}
.rc-dong{font-size:12px;color:var(--tx3);margin-top:1px}
.rc-nums{font-size:15px;display:flex;align-items:baseline;gap:12px;margin-bottom:4px;flex-wrap:wrap}
.rc-nums b{font-size:20px;font-weight:800}
