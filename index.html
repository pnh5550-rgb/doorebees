const fmt=n=>Number(n).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(ds){const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;}
function dday(ds){const now=new Date();now.setHours(0,0,0,0);const t=new Date(ds+'T00:00:00');const diff=Math.round((t-now)/86400000);if(diff===0)return{txt:'D-Day',cls:'dd-td'};if(diff>0&&diff<=3)return{txt:`D-${diff}일`,cls:'dd-nr'};if(diff>0&&diff<=7)return{txt:`D-${diff}일`,cls:'dd-sn'};if(diff>0)return{txt:`D-${diff}일`,cls:'dd-ft'};return{txt:`${Math.abs(diff)}일 전`,cls:'dd-ps'};}
function normType(t){if(t==='사육')return'선별';if(t==='폐기')return'산란폐기';return t;}
function calcSanSt(entries){const s={};for(const r of SAN_RO){const cap=SAN_ROOMS[r].cap,re=entries.filter(e=>e.room===r);const san=re.filter(e=>normType(e.type)==='산란').reduce((a,e)=>a+e.amount,0);const sel=re.filter(e=>normType(e.type)==='선별').reduce((a,e)=>a+e.amount,0);const peg=re.filter(e=>normType(e.type)==='산란폐기').reduce((a,e)=>a+e.amount,0);const occ=Math.max(0,san-sel-peg);s[r]={cap,occ,avail:Math.max(0,cap-occ),rate:Math.round(occ/cap*100),san,sel,peg};}return s;}
function calcSakSt(rearing){const s={};for(const r of SAK_RO){const cap=SAK_ROOMS[r].cap,re=rearing.filter(e=>e.room===r);const sak=re.filter(e=>e.type==='사육').reduce((a,e)=>a+e.amount,0);const out=re.filter(e=>e.type==='출하').reduce((a,e)=>a+e.amount,0);const peg=re.filter(e=>e.type==='사육폐기').reduce((a,e)=>a+e.amount,0);const occ=Math.max(0,sak-out-peg);s[r]={cap,occ,avail:Math.max(0,cap-occ),rate:Math.round(occ/cap*100),sak,out,peg};}return s;}
function sc(r){if(r<50)return'ok';if(r<70)return'go';if(r<85)return'wn';if(r<95)return'tg';return'dg';}
function sl(r){if(r<50)return'여유';if(r<70)return'양호';if(r<85)return'주의';if(r<95)return'빡빡';return'위험';}
let toastTimer;
function showToast(m){const e=document.getElementById('toast');if(!e)return;e.textContent=m;e.style.opacity=1;clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.style.opacity=0,2400);}
function fbListen(path,cb){const ref=firebase.database().ref(path);ref.on('value',snap=>cb(snap.val()));return()=>ref.off('value');}
async function fbPush(path,val){return firebase.database().ref(path).push(val);}
async function fbRemove(path){return firebase.database().ref(path).remove();}
async function fbUpdate(path,val){return firebase.database().ref(path).update(val);}

  const selSchedule=useMemo(()=>{

  },[rearing]);
  
  function nextMonth(mo){const[y,m]=mo.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
  const monthlyOut=useMemo(()=>{

  },[rearing]);
const monthlyStats=useMemo(()=>{const m={};entries.forEach(e=>{const mo=e.date.slice(0,7);if(!m[mo])m[mo]={month:mo,산란:0,선별:0,산란폐기:0,사육:0,출하:0,사육폐기:0};const t=normType(e.type);m[mo][t]=(m[mo][t]||0)+e.amount;});rearing.forEach(e=>{const mo=e.date.slice(0,7);if(!m[mo])m[mo]={month:mo,산란:0,선별:0,산란폐기:0,사육:0,출하:0,사육폐기:0};m[mo][e.type]=(m[mo][e.type]||0)+e.amount;});return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month));},[entries,rearing]);

  function SakRates(){

        <button className="exp-btn" onClick={doExport} disabled={exporting}>
          <i className={`ti ${exporting?'ti-loader':'ti-file-spreadsheet'}`} style={{fontSize:19,color:'var(--san)'}}/>
          <span style={{fontWeight:600}}>{exporting?'생성 중...':'엑셀 내보내기 (.xlsx)'}</span>
          <span style={{marginLeft:'auto',fontSize:11,color:'var(--tx2)'}}>4개 시트 · 최신순</span>
        </button>
        <div className="tab-inner">
          <button className={`ti-btn${histSec==='san'?' on-san':''}`} onClick={()=>{setHistSec('san');setHf('전체');setHr('전체');setHistView('batch');}}>🌱 산란세팅</button>
          <button className={`ti-btn${histSec==='sak'?' on-sak':''}`} onClick={()=>{setHistSec('sak');setHf('전체');setHr('전체');setHistView('batch');}}>🐝 사육세팅</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <button style={{flex:1,padding:'8px',border:'1.5px solid var(--bd2)',background:histView==='batch'?'var(--sf2)':'var(--sf)',borderRadius:'var(--rs)',cursor:'pointer',fontSize:13,fontWeight:histView==='batch'?700:400,color:histView==='batch'?'var(--tx)':'var(--tx2)',fontFamily:'inherit'}} onClick={()=>setHistView('batch')}>📊 배치현황</button>
          <button style={{flex:1,padding:'8px',border:'1.5px solid var(--bd2)',background:histView==='list'?'var(--sf2)':'var(--sf)',borderRadius:'var(--rs)',cursor:'pointer',fontSize:13,fontWeight:histView==='list'?700:400,color:histView==='list'?'var(--tx)':'var(--tx2)',fontFamily:'inherit'}} onClick={()=>setHistView('list')}>📋 전체이력</button>
        </div>
        {histView==='batch'&&histSec==='san'&&<SanBatchView/>}
        {histView==='batch'&&histSec==='sak'&&<SakBatchView/>}
        {histView==='list'&&(<>
          {histSec==='san'&&(<div className="fbar">{['전체','산란','선별','산란폐기'].map(f=><button key={f} className={`fbtn${hf===f?' on':''}`} onClick={()=>setHf(f)}>{f}</button>)}<span style={{opacity:.3,alignSelf:'center'}}>|</span>{['전체',...SAN_RO].map(r=><button key={r} className={`fbtn${hr===r?' on':''}`} onClick={()=>setHr(r)}>{r}</button>)}</div>)}
          {histSec==='sak'&&(<div className="fbar">{['전체','사육','출하','사육폐기'].map(f=><button key={f} className={`fbtn${hf===f?' on-sak':''}`} onClick={()=>setHf(f)}>{f}</button>)}<span style={{opacity:.3,alignSelf:'center'}}>|</span>{['전체',...SAK_RO].map(r=><button key={r} className={`fbtn${hr===r?' on-sak':''}`} onClick={()=>setHr(r)}>{r}</button>)}</div>)}
          <div className="cn">{filtHist.length}건 표시 ({histSec==='san'?entries.length:rearing.length}건 전체)</div>
          {filtHist.length===0?<div className="empty"><i className="ti ti-database-off"/>조건에 맞는 기록 없음</div>
          :filtHist.map(e=>{
            const t=histSec==='san'?normType(e.type):e.type;
            const bc=histSec==='sak'?'sak-hi':'';
            const tb=histSec==='san'?(t==='산란'?'b-san':t==='선별'?'b-sel':'b-peg'):(t==='사육'?'b-sak2':t==='출하'?'b-out':'b-spg');
            return(<div key={e.id} className={`hi ${bc}`}>
              <span className="hi-dt">{e.date.slice(5)}</span>
              <span className="hi-rm">{e.room}</span>
              <span className={`hi-b ${tb}`}>{t}</span>
              <span className="hi-a">{fmt(e.amount)}</span>
              {isAdmin&&<><button className="edit-btn" title="수정" onClick={()=>{setEditEntry(e);setEditSection(histSec);}}><i className="ti ti-pencil"/></button><button className="del" title="삭제" onClick={()=>histSec==='san'?delEntry(e.id):delRearing(e.id)}><i className="ti ti-x"/></button></>}
            </div>);
          })}
        </>)}
      </>)}
    </div>

    <div className="tabs">
      {[['dash','ti-layout-dashboard','현황'],['input','ti-plus','입력'],['sched','ti-calendar','일정'],['stat','ti-chart-bar','통계'],['hist','ti-history','이력']].map(([t,ic,lbl])=>(
        <button key={t} className={`tab${tab===t?' on':''}`} onClick={()=>setTab(t)}>
          <i className={`ti ${ic}`}/>{lbl}
        </button>
      ))}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
