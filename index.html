<script>
// ── 공용 배치 계산 (앱 화면 2곳 + 엑셀이 모두 사용 / 단일 진실원천) ──
// 규칙: 월요일 세팅분의 4주차(+28~+34일)에 같은 룸 선별/폐기를 귀속.
//   - 선별 윈도우 +25~+41일, 폐기 윈도우 +20~+41일 (둘 다 4주차 우선, 없으면 31일 최근접 자동귀속)
//   - 첫 선별일=1차, 이후=2차 / 선별율 = (1차+2차) ÷ 세팅
window.computeBatches = function(entries){
  function NT(t){if(t==='사육')return '선별';if(t==='폐기')return '산란폐기';return t;}
  function dd(d1,d2){return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000);}
  function addD(d,n){var dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
  var dr={};
  entries.forEach(function(e){if(NT(e.type)!=='산란')return;if(!dr[e.date])dr[e.date]=[];if(dr[e.date].indexOf(e.room)<0)dr[e.date].push(e.room);});
  var bmap={};
  entries.forEach(function(e){
    if(NT(e.type)!=='산란')return;
    var rooms=dr[e.date]; var mg=rooms.length>1;
    var k=mg?'M_'+e.date:e.date+'_'+e.room;
    if(!bmap[k])bmap[k]={key:k,date:e.date,room:mg?rooms.slice().sort().join('+'):e.room,rooms:rooms.slice(),merged:mg,san:0,sels:[],pegs:[]};
    bmap[k].san+=e.amount;
  });
  var list=Object.keys(bmap).map(function(k){return bmap[k];});
  // 귀속: 4주차 중심(+25~+37일). 같은 룸 + 그 창 안. 겹치면 31일에 가까운 배치.
  function pick(rec,lo,hi){
    var c=[];
    list.forEach(function(b){
      var rm=b.merged?b.rooms.indexOf(rec.room)>=0:rec.room===b.room; if(!rm)return;
      var d=dd(b.date,rec.date); if(d>=lo&&d<=hi)c.push({b:b,d:d});
    });
    if(!c.length)return null;
    c.sort(function(a,b){return Math.abs(a.d-31)-Math.abs(b.d-31);});
    return c[0].b;
  }
  entries.forEach(function(e){
    var nt=NT(e.type);
    if(nt==='선별'){var b=pick(e,25,37); if(b)b.sels.push({date:e.date,amount:e.amount});}
    else if(nt==='산란폐기'){var b2=pick(e,20,41); if(b2)b2.pegs.push({date:e.date,amount:e.amount});}
  });
  list.forEach(function(b){
    b.sels.sort(function(a,c){return a.date>c.date?1:(a.date<c.date?-1:0);});
    // 1차/2차 = 실제 선별 회차 순서: 가장 빠른 선별일=1차, 그 이후 날짜=2차
    // (기본은 4주차 화/금이지만, 수동으로 다른 날 입력해도 회차 순서로 정리됨)
    var fd=b.sels.length?b.sels[0].date:null; var s1=0,s2=0;
    b.sels.forEach(function(s){ if(s.date===fd) s1+=s.amount; else s2+=s.amount; });
    b.s1=s1; b.s2=s2; b.sel=s1+s2;
    b.peg=b.pegs.reduce(function(a,p){return a+p.amount;},0);
    b.remain=Math.max(0,b.san-b.sel-b.peg);
    b.rate=(b.san>0&&b.sel>0)?Math.round(b.sel/b.san*100):null;
  });
  list.sort(function(a,b){return a.date>b.date?-1:1;});
  return list;
};

    });
    ws4.getRow(5+i).height=18;
  });
  
  return wb;
};

.b-ok{background:#DCFCE7;color:#166534}.b-go{background:#DBEAFE;color:#1E40AF}.b-wn{background:#FEF9C3;color:#854D0E}.b-tg{background:#FFEDD5;color:#9A3412}.b-dg{background:#FEE2E2;color:#991B1B}

.tbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}

<script type="text/babel">

const {useState,useEffect,useMemo,useRef}=React;

const SAN_ROOMS={'가2D':{cap:3150},'가2A':{cap:1200},'가2B':{cap:750},'가2C':{cap:1050},'나1A':{cap:1050},'나1B':{cap:750},'나1C':{cap:750}};
const SAN_RO=['가2D','가2A','가2B','가2C','나1A','나1B','나1C'];
const WD=['일','월','화','수','목','금','토'];
const HIST_INIT=window.__HIST__||[];
const BR_INIT=window.__BR__||[];

const fmt=n=>Number(n).toLocaleString();
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}(${WD[dt.getDay()]})`;}
function fmtMD(d){return d?d.slice(5).replace('-','/'):'—';}
function dday(ds){const now=new Date();now.setHours(0,0,0,0);const t=new Date(ds+'T00:00:00');const diff=Math.round((t-now)/86400000);if(diff<0)return{txt:'완료',cls:'dd-ft'};if(diff===0)return{txt:'오늘',cls:'dd-td'};if(diff<=3)return{txt:`D-${diff}일`,cls:'dd-nr'};if(diff<=7)return{txt:`D-${diff}일`,cls:'dd-sn'};return{txt:`D-${diff}일`,cls:'dd-ft'};}
// 세팅일 기준 4주차(+28일)가 속한 주의 화요일·금요일 반환 (세팅 요일 무관)
function weekTueFri(settingDate){
  // 세팅일이 속한 '그 주의 월요일'을 기준점으로 (세팅 요일 무관)
  const dt=new Date(settingDate+'T00:00:00');
  const day=dt.getDay(); // 0=일,1=월,...,6=토
  const toMon=day===0?-6:1-day; // 그 주 월요일까지 오프셋
  const mon=addDays(settingDate,toMon);
  // 4주 뒤(+28일) 월요일 → 화요일(+29), 금요일(+32)
  return{s1:addDays(mon,29),s2:addDays(mon,32)};
}
function normType(t){if(t==='사육')return '선별';if(t==='폐기')return '산란폐기';return t;}

function calcSanSt(entries){
  const s={};
  for(const r of SAN_RO){
    const cap=SAN_ROOMS[r].cap;
    const re=entries.filter(e=>e.room===r);
    const san=re.filter(e=>normType(e.type)==='산란').reduce((a,e)=>a+e.amount,0);
    const sel=re.filter(e=>normType(e.type)==='선별').reduce((a,e)=>a+e.amount,0);
    const peg=re.filter(e=>normType(e.type)==='산란폐기').reduce((a,e)=>a+e.amount,0);
    const occ=Math.max(0,san-sel-peg);
    s[r]={cap,occ,avail:Math.max(0,cap-occ),rate:cap>0?Math.round(occ/cap*100):0};
  }
  return s;
}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:12px 22px;border-radius:24px;font-size:15px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap;';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

function fbPush(path,val){return firebase.database().ref(path).push(val);}
function fbRemove(path){return firebase.database().ref(path).remove();}
function fbUpdate(path,val){return firebase.database().ref(path).update(val);}

// ── SanCard ──
function SanCard({room,st,big}){
  const pct=st.rate;
  const c=pct<50?'ok':pct<75?'go':pct<90?'wn':'dg';
  return(
    <div className={`rc san-rc${big?' rc-big':''}${room.startsWith('나')?' rc-na':''}`}>
      <div className="rc-top">
        <span className="rc-name">{room}</span>
        <span className={`badge b-${c}`}>세팅 {pct}%</span>
      </div>
      <div className="bar-bg"><div className={`bar-fill bar-${c}`} style={{width:`${Math.min(100,pct)}%`}}/></div>
      <div className="rc-stats">
        <div style={{textAlign:'left'}}><div className="rc-sl">현재세팅</div><b className="rc-sv sv-occ">{fmt(st.occ)}</b></div>
        <div style={{textAlign:'center'}}><div className="rc-sl">여유</div><b className={`rc-sv${st.avail<200?' sv-low':''}`}>{fmt(st.avail)}</b></div>
      </div>
      <div style={{marginTop:6,fontSize:13,color:'var(--tx3)',fontWeight:700,textAlign:'right'}}>총 {fmt(st.cap)}</div>
    </div>
  );
}

// ── AdminModal ──
function AdminModal({onClose,onSuccess}){
  const [mode,setMode]=useState('login');
  const [pw,setPw]=useState('');const[np1,setNp1]=useState('');const[np2,setNp2]=useState('');
  const [err,setErr]=useState('');const[ok,setOk]=useState('');const[loading,setLoading]=useState(false);

  function doLogin(){
    if(!pw){setErr('비밀번호를 입력해주세요');return;}
    setLoading(true);
    setTimeout(()=>{
      if(pw===window.ADMIN_PW){onSuccess();}
      else{setErr('비밀번호가 틀렸습니다');setLoading(false);}
    },300);
  }
  function doChange(){
    if(pw!==window.ADMIN_PW){setErr('현재 비밀번호가 틀렸습니다');return;}
    if(np1.length<4){setErr('새 비밀번호는 4자 이상이어야 해요');return;}
    if(np1!==np2){setErr('새 비밀번호가 일치하지 않아요');return;}
    window.ADMIN_PW=np1;
    try{firebase.database().ref('config/adminPw').set(np1);}catch(e){}
    setOk('✅ 비밀번호가 변경되었습니다');setErr('');
    setTimeout(()=>onClose(),1500);
  }

  const inp={width:'100%',padding:'16px',fontSize:18,border:'2px solid var(--bd)',borderRadius:12,outline:'none',background:'var(--bg)',color:'var(--tx)',fontFamily:'inherit',boxSizing:'border-box',marginBottom:14};
  const btnP={width:'100%',padding:'18px',fontSize:18,fontWeight:800,borderRadius:12,border:'none',cursor:'pointer',background:'var(--san)',color:'white',marginBottom:10,fontFamily:'inherit'};
  const btnS={width:'100%',padding:'14px',fontSize:16,fontWeight:600,borderRadius:12,border:'2px solid var(--bd)',cursor:'pointer',background:'transparent',color:'var(--tx2)',fontFamily:'inherit'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:20}} onClick={onClose}>
      <div style={{background:'var(--sf)',borderRadius:20,padding:'36px 28px',width:'100%',maxWidth:400,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
        {mode==='login'?(<>
          <div style={{fontSize:26,fontWeight:900,marginBottom:6,color:'var(--tx)'}}>🔐 관리자 로그인</div>
          <div style={{fontSize:16,color:'var(--tx2)',marginBottom:24}}>비밀번호를 입력해 주세요</div>
          {err&&<div style={{background:'var(--rd-bg)',color:'var(--rd-t)',padding:'14px',borderRadius:10,marginBottom:14,fontSize:16,fontWeight:600}}>⚠️ {err}</div>}
          <input style={inp} type="password" placeholder="비밀번호" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
          <button style={btnP} onClick={doLogin} disabled={loading}>{loading?'확인 중...':'로그인'}</button>
          <button style={btnS} onClick={()=>{setMode('change');setErr('');setPw('');}}>🔑 비밀번호 변경</button>
        </>):(<>
          <div style={{fontSize:26,fontWeight:900,marginBottom:6,color:'var(--tx)'}}>🔑 비밀번호 변경</div>
          <div style={{fontSize:15,color:'var(--tx2)',marginBottom:20}}>현재 비밀번호 확인 후 새 비밀번호 설정</div>
          {err&&<div style={{background:'var(--rd-bg)',color:'var(--rd-t)',padding:'14px',borderRadius:10,marginBottom:14,fontSize:16,fontWeight:600}}>⚠️ {err}</div>}
          {ok&&<div style={{background:'var(--san-h)',color:'var(--san-t)',padding:'14px',borderRadius:10,marginBottom:14,fontSize:16,fontWeight:600}}>{ok}</div>}
          <div style={{fontSize:15,color:'var(--tx2)',marginBottom:6,fontWeight:700}}>현재 비밀번호</div>
          <input style={inp} type="password" placeholder="현재 비밀번호" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}}/>
          <div style={{fontSize:15,color:'var(--tx2)',marginBottom:6,fontWeight:700}}>새 비밀번호 (4자 이상)</div>
          <input style={inp} type="password" placeholder="새 비밀번호" value={np1} onChange={e=>{setNp1(e.target.value);setErr('');}}/>
          <div style={{fontSize:15,color:'var(--tx2)',marginBottom:6,fontWeight:700}}>새 비밀번호 확인</div>
          <input style={inp} type="password" placeholder="새 비밀번호 확인" value={np2} onChange={e=>{setNp2(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&doChange()}/>
          <button style={btnP} onClick={doChange}>변경 완료</button>
          <button style={btnS} onClick={()=>{setMode('login');setErr('');}}>← 로그인으로</button>
        </>)}
      </div>
    </div>
  );
}

        <div style={{fontSize:20,fontWeight:800,marginBottom:18}}>✏️ 기록 수정</div>
        <label className="lbl">날짜</label>
        <input className="dinp" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <label className="lbl">룸</label>
        <div className="rbtns">{SAN_RO.map(r=><button key={r} className={`rbtn${room===r?' s-san':''}`} onClick={()=>setRoom(r)}>{r}</button>)}</div>
        <label className="lbl">종류</label>
        <div className="tbtns">{[['산란','ti-egg','s-san'],['사육','ti-share','s-sel'],['폐기','ti-trash','s-peg']].map(([t,ic,cls])=>(
          <button key={t} className={`tbtn${type===t?' '+cls:''}`} onClick={()=>setType(t)}>
            <i className={`ti ${ic}`}/>{t==='산란'?'산란세팅':t==='사육'?'사육세팅':'산란폐기'}
          </button>
        ))}</div>
        <label className="lbl">수량</label>
        <input className="ainp" type="number" value={amount} onChange={e=>setAmount(e.target.value)}/>
        {err&&<div style={{color:'var(--rd-t)',fontSize:15,marginBottom:8}}>{err}</div>}
        <div className="modal-btns">
          <button className="mbtn" onClick={onClose}>취소</button>
          <button className="mbtn p-san" onClick={()=>{if(!amount||Number(amount)<=0){setErr('수량 확인');return;}onSave({...entry,date,room,type,amount:Number(amount)});}}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── SanBatchView ──
function SanBatchView({entries,year}){
  const td=today();
  const grpList=window.computeBatches(entries).filter(g=>!year||year==='전체'||g.date.slice(0,4)===year);
  if(!grpList.length)return <div className="empty"><i className="ti ti-database-off"/>데이터 없음</div>;
  return(<>{grpList.map((g,i)=>{
    const peg=g.peg;
    const sel=g.sel;
    const remain=g.remain;
    const selR=g.san>0?Math.round(sel/g.san*100):0;
    const pegR=g.san>0?Math.round(peg/g.san*100):0;
    const done=addDays(g.date,42)<td;
    return(
      <div key={i} style={{background:'var(--sf)',border:'1px solid var(--bd)',borderLeft:`4px solid ${g.merged?'var(--sak)':'var(--san)'}`,borderRadius:'var(--r)',padding:'16px',marginBottom:12,boxShadow:'var(--sh)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div>
            <span style={{fontSize:20,fontWeight:800,color:g.merged?'var(--sak-t)':'var(--san-t)'}}>{g.room}</span>
            <span style={{fontSize:15,color:'var(--tx2)',marginLeft:10}}>{fmtDate(g.date)}</span>
            {done&&<span style={{marginLeft:8,fontSize:13,background:'var(--sf2)',color:'var(--tx3)',padding:'3px 9px',borderRadius:10}}>완료</span>}
          </div>
          <div style={{textAlign:'right'}}><b style={{fontSize:22}}>산란세팅 {fmt(g.san)}</b></div>
        </div>
        <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',marginBottom:12,background:'var(--sf2)'}}>
          {sel>0&&<div style={{width:Math.min(selR,100)+'%',background:'var(--sel)',transition:'width .5s'}}/>}
          {peg>0&&<div style={{width:Math.min(pegR,100-selR)+'%',background:'var(--peg)'}}/>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          <div style={{background:'var(--sel-bg)',borderRadius:10,padding:'10px 12px',border:'1px solid #93C5FD'}}>
            <div style={{fontSize:13,color:'var(--sel-t)',fontWeight:700,marginBottom:4}}>✓ 사육세팅</div>
            <div style={{fontSize:22,fontWeight:800,color:'var(--sel-t)'}}>{fmt(sel)}</div>
            <div style={{fontSize:13,color:'var(--sel-t)',fontWeight:700,marginTop:3}}>{selR}%</div>
          </div>
          <div style={{background:peg>0?'var(--peg-bg)':'var(--sf2)',borderRadius:10,padding:'10px 12px',border:'1px solid var(--bd)'}}>
            <div style={{fontSize:13,color:'var(--peg-t)',fontWeight:700,marginBottom:4}}>✗ 폐기</div>
            <div style={{fontSize:22,fontWeight:800,color:peg>0?'var(--peg-t)':'var(--tx3)'}}>{peg>0?fmt(peg):'—'}</div>
            <div style={{fontSize:13,color:peg>0?'var(--peg-t)':'var(--tx3)',fontWeight:700,marginTop:3}}>{peg>0?pegR+'%':done?'없음':''}</div>
          </div>
          <div style={{background:'var(--san-h)',borderRadius:10,padding:'10px 12px',border:'1px solid #86EFAC'}}>
            <div style={{fontSize:13,color:'var(--san-t)',fontWeight:700,marginBottom:4}}>📦 잔류</div>
            <div style={{fontSize:22,fontWeight:800,color:'var(--san-t)'}}>{fmt(remain)}</div>
            <div style={{fontSize:13,color:'var(--san-t)',fontWeight:700,marginTop:3}}>{g.san>0?Math.round(remain/g.san*100)+'%':''}</div>
          </div>
        </div>
        {!done&&(()=>{const {s1,s2}=weekTueFri(g.date);return <div style={{marginTop:10,fontSize:14,color:'var(--tx2)',display:'flex',gap:18}}>
          <span>1차 예정: <b style={{color:'var(--sel)'}}>{fmtDate(s1)}</b></span>
          <span>2차 예정: <b style={{color:'var(--sel)'}}>{fmtDate(s2)}</b></span>
        </div>;})()}
      </div>
    );
  })}</>);
}

// ── BatchRates ──
function BatchRates({entries,year}){
  const td=today();
  const rows=window.computeBatches(entries).filter(g=>!year||year==='전체'||g.date.slice(0,4)===year);
  const fmtMD2=d=>{const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`;};
  const fmtYr=d=>d.slice(0,4);

  return(
    <div className="card" style={{marginBottom:10}}>
      <div className="card-hdr">
        <span>배치별 사육선별율 ({year&&year!=='전체'?year+'년':'전체'})</span>
        <span style={{fontSize:12,color:'var(--tx2)'}}>4주차 2회</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {rows.map((g,i)=>{
          const s1=g.s1,s2=g.s2,peg=g.peg;
          const done=addDays(g.date,42)<td;
          const sr=g.rate;
          const srBg=sr===null?'var(--sf2)':sr>=45?'var(--san)':sr>=25?'#D97706':'var(--rd)';
          const srCol=sr===null?'var(--tx3)':'#fff';
          const srTxt=sr===null?(done?'—':'대기'):sr+'%';
          const roomList=g.room.split('+');
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:9,border:'1px solid var(--bd)',borderLeft:`4px solid ${g.merged?'var(--sak)':'var(--san)'}`,borderRadius:12,padding:'11px 11px',background:'var(--sf)',boxShadow:'var(--sh)'}}>
              {/* 날짜+룸(세로) */}
              <div style={{minWidth:50,flexShrink:0}}>
                <div style={{fontSize:12,color:'var(--tx3)',fontWeight:700}}>{fmtYr(g.date)}</div>
                <div style={{fontSize:17,fontWeight:900,letterSpacing:'-.5px',lineHeight:1.1}}>{fmtMD2(g.date)}</div>
                <div style={{marginTop:3,display:'flex',flexDirection:'column',gap:1}}>
                  {roomList.map(r=><span key={r} style={{fontSize:13,fontWeight:800,color:g.merged?'var(--sak-t)':'var(--san-t)',lineHeight:1.2}}>{r}</span>)}
                </div>
              </div>
              {/* 수치 (왼쪽 정렬, 고정 크기) */}
              <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,minWidth:0}}>
                {[['세팅',g.san,'var(--san-t)'],['1차',s1,'var(--sel-t)'],['2차',s2,'var(--sel-t)'],['폐기',peg,'var(--peg-t)']].map(([lbl,val,col],j)=>{
                  const txt=val>0?val.toLocaleString():'—';
                  return(
                    <div key={j} style={{display:'flex',flexDirection:'column',alignItems:'flex-start',minWidth:0}}>
                      <div style={{fontSize:12.5,color:'var(--tx2)',fontWeight:700,lineHeight:1.4,height:18}}>{lbl}</div>
                      <div style={{fontSize:14,fontWeight:800,color:val>0?col:'var(--tx3)',letterSpacing:'-.5px',whiteSpace:'nowrap',lineHeight:1.2}}>{txt}</div>
                    </div>
                  );
                })}
              </div>
              {/* 선별율 배지 */}
              <div style={{flexShrink:0,fontSize:13,fontWeight:900,color:srCol,background:srBg,borderRadius:8,padding:'6px 6px',minWidth:44,textAlign:'center',letterSpacing:'-.5px',lineHeight:1.1}}>{srTxt}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── 앱 ──
function App(){
  const [entries,setEntries]=useState(HIST_INIT);
  const [fbConn,setFbConn]=useState(false);
  const [isAdmin,setIsAdmin]=useState(()=>localStorage.getItem('db_admin')==='1');
  const [showAdminModal,setShowAdminModal]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [tab,setTab]=useState(()=>localStorage.getItem('db_tab')||'dash');
  const [hf,setHf]=useState('전체');const[hr,setHr]=useState('');
  const [yr,setYr]=useState('전체');
  const [histView,setHistView]=useState('all');
  const [form,setForm]=useState({date:today(),room:'가2D',type:'산란',amount:''});
  const [exporting,setExporting]=useState(false);
  const unsubRef=useRef(null);

  useEffect(()=>{
    if(typeof firebase==='undefined')return;
    try{
      const ref=firebase.database().ref('entries_v2');
      unsubRef.current=ref;
      ref.on('value',snap=>{
        const val=snap.val();
        if(val){
          const arr=Object.entries(val).map(([id,v])=>({...v,id})).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
          setEntries(arr);
        }else{doUpload(HIST_INIT);}
        setFbConn(true);
      });
      firebase.database().ref('config/adminPw').once('value').then(snap=>{if(snap.val())window.ADMIN_PW=snap.val();});
    }catch(e){console.error(e);}
    return()=>{if(unsubRef.current)unsubRef.current.off();};
  },[]);

  function doUpload(data){
    if(typeof firebase==='undefined')return;
    const obj={};data.forEach(e=>{const{id,...rest}=e;obj[id]=rest;});
    firebase.database().ref('entries_v2').set(obj);
    localStorage.setItem('db_hist_v','5');
  }

  const sanSt=useMemo(()=>calcSanSt(entries),[entries]);
  const totalSanAvail=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].avail,0),[sanSt]);
  const totalSanCap=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].cap,0),[sanSt]);
  const totalSanOcc=useMemo(()=>SAN_RO.reduce((s,r)=>s+sanSt[r].occ,0),[sanSt]);

  const years=useMemo(()=>[...new Set(entries.map(e=>e.date.slice(0,4)))].sort().reverse(),[entries]);

  // 상단 실적: 연도 필터(yr) 반응 — computeBatches 기준
  const statSummary=useMemo(()=>{
    const batches=window.computeBatches(entries).filter(b=>yr==='전체'||b.date.slice(0,4)===yr);
    const san=batches.reduce((s,b)=>s+b.san,0);
    const sel=batches.reduce((s,b)=>s+b.sel,0);
    const peg=batches.reduce((s,b)=>s+b.peg,0);
    // 사육선별율 = 선별이 발생한 배치들의 선별율 평균
    const rated=batches.filter(b=>b.rate!==null);
    const selRate=rated.length?Math.round(rated.reduce((s,b)=>s+b.rate,0)/rated.length):0;
    const pegR=san>0?Math.round(peg/san*100):0;
    return{san,sel,peg,selRate,ratedCnt:rated.length,pegR};
  },[entries,yr]);

  const monthlyStats=useMemo(()=>{
    const m={};
    entries.forEach(e=>{
      const mo=e.date.slice(0,7);
      if(!m[mo])m[mo]={month:mo,산란:0,선별:0,산란폐기:0};
      const t=normType(e.type);
      m[mo][t]=(m[mo][t]||0)+e.amount;
    });
    const arr=Object.values(m).sort((a,b)=>a.month.localeCompare(b.month));
    let run=0;
    arr.forEach(x=>{x.net=x.산란-x.선별-x.산란폐기;run+=x.net;x.cum=run;});
    return arr;
  },[entries]);
  const maxStat=useMemo(()=>Math.max(...monthlyStats.map(m=>Math.max(m.산란||0,m.선별||0)),1),[monthlyStats]);
  const shownMonths=useMemo(()=>{
    const f=monthlyStats.filter(m=>yr==='전체'||m.month.slice(0,4)===yr);
    return yr==='전체'?f.slice(-12):f;  // 전체 선택 시 최근 12개월만
  },[monthlyStats,yr]);
  const shownMax=useMemo(()=>Math.max(...shownMonths.map(m=>Math.max(m.산란||0,m.선별||0)),1),[shownMonths]);

  const selSchedule=useMemo(()=>{
    const td=today();
    // computeBatches(단일 진실원천)를 그대로 사용 → 일정·이력·엑셀 완전 일치
    return window.computeBatches(entries)
      .filter(b=>b.date>=addDays(td,-60))  // 세팅일 기준 최근 60일만 표시
      .map(b=>{
        const {s1,s2}=weekTueFri(b.date);
        const sel1Done=b.s1>0;          // computeBatches가 귀속한 1차 선별량
        const sel2Done=b.s2>0;          // 2차 선별량
        const done1=sel1Done||s1<td;    // 1차: 실제 선별 기록 있거나 예정일 지남
        const done2=sel2Done||s2<td;    // 2차: 실제 선별 기록 있거나 예정일 지남
        const done=done1&&done2;
        return{date:b.date,room:b.room,amount:b.san,s1,s2,sel1Done,sel2Done,done1,done2,done};
      });
  },[entries]);

  async function submitEntry(){
    if(!isAdmin){showToast('관리자 로그인 후 입력 가능');return;}
    if(!form.amount||Number(form.amount)<=0){showToast('수량을 입력해주세요');return;}
    const ne={date:form.date,room:form.room,type:form.type,amount:Number(form.amount)};
    try{
      if(fbConn){await fbPush('entries_v2',ne);}
      else{setEntries(prev=>[...prev,{...ne,id:'loc_'+Date.now()}].sort((a,b)=>a.date.localeCompare(b.date)));}
      const label=ne.type==='산란'?'산란세팅':ne.type==='사육'?'사육세팅':'산란폐기';
      showToast(`✓ ${label} ${fmt(ne.amount)} 저장`);
      setForm(f=>({...f,amount:''}));
    }catch(e){showToast('저장 실패: '+e.message);}
  }
  async function delEntry(id){
    if(!isAdmin||!confirm('삭제할까요?'))return;
    if(fbConn){await fbRemove(`entries_v2/${id}`);}else{setEntries(p=>p.filter(e=>e.id!==id));}
    showToast('삭제됨');
  }
  async function saveEdit(data){
    const{id,...rest}=data;
    if(fbConn){await fbUpdate(`entries_v2/${id}`,rest);}else{setEntries(p=>p.map(e=>e.id===id?data:e));}
    setEditEntry(null);showToast('수정됨');
  }
  function doExport(){
    if(!window.ExcelJS){showToast('ExcelJS 로딩 중... 잠시 후 다시 시도해주세요');return;}
    setExporting(true);
    showToast('⏳ 엑셀 생성 중...');
    setTimeout(()=>{
      try{
        const wb=window.generateExcel(entries);
        if(!wb){showToast('엑셀 생성 실패');setExporting(false);return;}
        wb.xlsx.writeBuffer().then(buf=>{
          const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
          const u=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=u;
          a.download='두레비스팜_산란현황_'+today().replace(/-/g,'')+'.xlsx';
          document.body.appendChild(a);a.click();
          document.body.removeChild(a);URL.revokeObjectURL(u);
          showToast('✓ 엑셀 저장 완료 (4개 시트 · '+entries.length+'건)');
          setExporting(false);
        }).catch(err=>{showToast('오류: '+err.message);setExporting(false);});
      }catch(err){
        showToast('오류: '+err.message);
        setExporting(false);
      }
    },100);
  }
  const filtEntries=useMemo(()=>{
    return entries.filter(e=>{
      if(yr!=='전체'&&e.date.slice(0,4)!==yr)return false;
      const nt=normType(e.type);
      if(hf==='산란'&&nt!=='산란')return false;
      if(hf==='선별'&&nt!=='선별')return false;
      if(hf==='폐기'&&nt!=='산란폐기')return false;
      if(hr&&e.room!==hr)return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[entries,hf,hr,yr]);

  const typeLabel=t=>t==='산란'?'산란세팅':t==='사육'?'사육세팅':t==='폐기'?'산란폐기':t;
  const typeBadge=t=>t==='산란'?'b-san':t==='사육'?'b-sel':'b-peg';
  const TABS=[['dash','ti-layout-dashboard','현황'],['input','ti-plus','입력'],['sched','ti-calendar','일정'],['stat','ti-chart-bar','통계'],['hist','ti-history','이력']];

  // 입력 미리보기: amount 있을 때만
  const hasPreview = form.amount && Number(form.amount) > 0;

  return(
    <div className="app">
      {showAdminModal&&<AdminModal onClose={()=>setShowAdminModal(false)} onSuccess={()=>{setIsAdmin(true);localStorage.setItem('db_admin','1');showToast('✓ 관리자 활성화');setShowAdminModal(false);}}/>}
      {editEntry&&<EditModal entry={editEntry} onSave={saveEdit} onClose={()=>setEditEntry(null)}/>}

      <div className="hdr">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div>
            <div className="hdr-t">🍯 산란세팅관리</div>
            <div className="hdr-s">산란여분 {fmt(totalSanAvail)} <span className={`sync-dot${fbConn?'':' dot-off'}`}/></div>
          </div>
        </div>
        <div className="hdr-r">
          {isAdmin
            ?<button className="lock-btn" onClick={()=>{setIsAdmin(false);localStorage.removeItem('db_admin');showToast('잠금됨');}}><i className="ti ti-lock-open"/> 잠금해제</button>
            :<button className="lock-btn" onClick={()=>setShowAdminModal(true)}><i className="ti ti-lock"/> 관리자</button>
          }
        </div>
      </div>
      {isAdmin&&<div className="admin-bar"><span className="admin-badge"><i className="ti ti-shield-check"/> 관리자</span> 입력·수정·삭제 활성화<span style={{marginLeft:'auto',fontSize:13}}>● 실시간</span></div>}

      <div className="cont">

        {/* ── 현황 ── */}
        {tab==='dash'&&(
          <div className="room-layout">
            <div style={{background:'linear-gradient(135deg,#1B4332 0%,#0d5e44 60%,#0a3a2a 100%)',borderRadius:'var(--r)',padding:'16px 18px',marginBottom:6,boxShadow:'0 6px 20px rgba(11,58,42,.3)',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',right:-24,top:-24,width:120,height:120,borderRadius:'50%',background:'rgba(245,179,1,.10)'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',color:'white',position:'relative'}}>
                <div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.6)',marginBottom:5,fontWeight:600,letterSpacing:'.3px'}}>전체 산란세팅 {fmt(totalSanOcc)} / {fmt(totalSanCap)}</div>
                  <span style={{fontSize:15,color:'rgba(255,255,255,.8)'}}>여유 <b style={{fontSize:20,color:'#86EFAC',fontWeight:900,marginLeft:2}}>{fmt(totalSanAvail)}</b></span>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.6)',marginBottom:2,fontWeight:600}}>세팅율</div>
                  <div style={{fontSize:32,fontWeight:900,lineHeight:1,letterSpacing:'-1px'}}>{totalSanCap>0?Math.round(totalSanOcc/totalSanCap*100):0}<span style={{fontSize:17,fontWeight:500}}>%</span></div>
                </div>
              </div>
              <div style={{marginTop:11,background:'rgba(255,255,255,.15)',borderRadius:4,height:6,overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',background:'linear-gradient(90deg,#86EFAC,#F5B301)',width:totalSanCap>0?Math.round(totalSanOcc/totalSanCap*100)+'%':'0%',transition:'width .6s',borderRadius:4}}/>
              </div>
            </div>
            <SanCard room="가2D" st={sanSt['가2D']} big={true}/>
            <div className="room-sub">
              {['가2A','가2B','가2C','나1A','나1B','나1C'].map(r=><SanCard key={r} room={r} st={sanSt[r]}/>)}
            </div>
          </div>
        )}

        {/* ── 입력 ── */}
        {tab==='input'&&(<>
          <div className="in-card">
            <label className="lbl"><i className="ti ti-calendar-event"/> 날짜</label>
            <input type="date" className="dinp" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <label className="lbl"><i className="ti ti-home"/> 산란실 룸 <span className="lbl-hint">숫자=여유</span></label>
            <div className="rbtns">
              {SAN_RO.map(r=>{
                const av=sanSt[r].avail;const sel=form.room===r;
                return(<button key={r} className={`rbtn${sel?(r.startsWith('나')?' s-na':' s-san'):''}`} onClick={()=>setForm(f=>({...f,room:r}))}>
                  {r}<div className="sub">{fmt(av)}</div>
                </button>);
              })}
            </div>
            <label className="lbl"><i className="ti ti-category"/> 종류</label>
            <div className="tbtns">
              {[['산란','ti-egg','s-san','산란세팅'],['사육','ti-share','s-sel','사육세팅'],['폐기','ti-trash','s-peg','산란폐기']].map(([t,ic,cls,lbl])=>(
                <button key={t} className={`tbtn${form.type===t?' '+cls:''}`} onClick={()=>setForm(f=>({...f,type:t}))}>
                  <i className={`ti ${ic}`}/>{lbl}
                </button>
              ))}
            </div>
            <label className="lbl"><i className="ti ti-hash"/> 수량 <span className="lbl-hint">마릿수</span></label>
            <input type="number" className="ainp" placeholder="0" value={form.amount} min={1}
              onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
              onKeyDown={e=>e.key==='Enter'&&isAdmin&&submitEntry()}/>
          </div>
          {hasPreview&&(
            <div className="in-preview">
              <div className="in-preview-h"><i className="ti ti-eye"/> 입력 확인</div>
              <div className="in-preview-g">
                <div><span>날짜</span><b>{form.date}</b></div>
                <div><span>룸</span><b style={{color:'var(--san-t)'}}>{form.room}</b></div>
                <div><span>종류</span><b>{typeLabel(form.type)}</b></div>
                <div><span>수량</span><b style={{color:'var(--san-t)',fontSize:18}}>{fmt(Number(form.amount))}</b></div>
              </div>
            </div>
          )}
          {!isAdmin&&<div className="readonly-box"><i className="ti ti-lock"/> 관리자 로그인 후 입력 가능</div>}
          <button className="sbtn san" disabled={!isAdmin} onClick={submitEntry}><i className="ti ti-check"/> 입력 완료</button>
        </>)}

        {/* ── 일정 ── */}
        {tab==='sched'&&(<>
          {selSchedule.length===0
            ?<div className="empty"><i className="ti ti-calendar-off"/>예정된 일정 없음</div>
            :selSchedule.map((s,i)=>{
              const d1=dday(s.s1),d2=dday(s.s2);
              return(
                <div key={i} className={`si${s.done?' si-done':''}`}>
                  <div className="si-h">
                    <div><div className="si-n">{s.room}</div><div className="si-m">산란 {fmtDate(s.date)} · {fmt(s.amount)}</div></div>
                    {(()=>{
                      if(s.done)return <span className="badge b-dg">완료</span>;
                      const dd1=s.done1?d2:d1;  // 표시할 D-day (1차 끝났으면 2차)
                      const bcls=dd1.cls==='dd-td'?'dg':dd1.cls==='dd-nr'?'tg':dd1.cls==='dd-sn'?'wn':'ok';
                      return <span className={`badge b-${bcls}`}>{dd1.txt}</span>;
                    })()}
                  </div>
                  <div className="si-dates">
                    <div className={`si-db${s.done1?' si-cell-done':''}`}><div className="si-dl">① 1차 선별 (화)</div><div className="si-dv">{fmtDate(s.s1)}</div><div className={`si-dd ${s.done1?'dd-done':d1.cls}`}>{s.done1?'✓ 완료':d1.txt}</div></div>
                    <div className={`si-db${s.done2?' si-cell-done':''}`}><div className="si-dl">② 2차 선별 (금)</div><div className="si-dv">{fmtDate(s.s2)}</div><div className={`si-dd ${s.done2?'dd-done':d2.cls}`}>{s.done2?'✓ 완료':d2.txt}</div></div>
                  </div>
                  {!s.done&&isAdmin&&<button className="si-ib" onClick={()=>{setForm({date:s.s1,room:s.room,type:'사육',amount:''});setTab('input');localStorage.setItem('db_tab','input');}}><i className="ti ti-plus" style={{fontSize:16}}/>선별 입력하기</button>}
                </div>
              );
            })}
        </>)}

        {/* ── 통계 ── */}
        {tab==='stat'&&(<>
          <button className="exp-btn" onClick={doExport}>
            <i className="ti ti-file-spreadsheet" style={{fontSize:22,color:'#16A34A'}}/>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:800,fontSize:16}}>엑셀 보고서 내보내기</div>
              <div style={{fontSize:13,color:'var(--tx2)'}}>현황·배치선별율·전체이력·월별통계 (4개 시트)</div>
            </div>
            <i className="ti ti-download" style={{fontSize:20,color:'var(--tx2)'}}/>
          </button>

          {years.length>1&&(
            <div className="fbar" style={{marginBottom:10}}>
              <span style={{padding:'0 6px 0 2px',color:'var(--tx3)',fontSize:13,fontWeight:700}}>연도</span>
              {['전체',...years].map(y=><button key={y} className={`fbtn${yr===y?' on':''}`} onClick={()=>setYr(y)}>{y==='전체'?'전체':y+'년'}</button>)}
            </div>
          )}

          <div style={{background:'var(--sf)',border:'1px solid var(--bd)',borderRadius:'var(--r)',padding:'16px',marginBottom:12,boxShadow:'var(--sh)'}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--tx2)',marginBottom:12}}>📊 {yr==='전체'?'전체 실적':yr+'년 실적'}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              <div style={{textAlign:'center',padding:'12px 8px',background:'var(--san-h)',borderRadius:10}}>
                <div style={{fontSize:13,color:'var(--san-t)',fontWeight:700,marginBottom:5}}>산란세팅</div>
                <div style={{fontSize:22,fontWeight:900,color:'var(--san-t)'}}>{fmt(statSummary.san)}</div>
              </div>
              <div style={{textAlign:'center',padding:'12px 8px',background:'var(--sel-bg)',borderRadius:10}}>
                <div style={{fontSize:13,color:'var(--sel-t)',fontWeight:700,marginBottom:5}}>사육선별</div>
                <div style={{fontSize:22,fontWeight:900,color:'var(--sel-t)'}}>{fmt(statSummary.sel)}</div>
                <div style={{fontSize:14,color:'var(--sel-t)',fontWeight:700}}>{statSummary.selRate}%</div>
              </div>
              <div style={{textAlign:'center',padding:'12px 8px',background:'var(--peg-bg)',borderRadius:10}}>
                <div style={{fontSize:13,color:'var(--peg-t)',fontWeight:700,marginBottom:5}}>폐기</div>
                <div style={{fontSize:22,fontWeight:900,color:'var(--peg-t)'}}>{fmt(statSummary.peg)}</div>
                <div style={{fontSize:14,color:'var(--peg-t)',fontWeight:700}}>{statSummary.pegR}%</div>
              </div>
            </div>
          </div>

          {shownMonths.length>0&&(
            <div className="card" style={{marginBottom:10}}>
              <div className="card-hdr">월별 산란 현황 ({yr==='전체'?'최근 1년':yr+'년'})</div>
              <div className="leg">
                <div className="leg-i"><div className="leg-b" style={{background:'var(--san)'}}/>산란세팅</div>
                <div className="leg-i"><div className="leg-b" style={{background:'var(--sel)'}}/>사육세팅</div>
                <div className="leg-i" style={{color:'var(--tx2)'}}>누적=월말 재고</div>
              </div>
              <div className="chart-wrap"><div className="chart-area">
                {shownMonths.map(m=>(
                  <div key={m.month} className="chart-col">
                    <div className="chart-bars">
                      {[['산란','var(--san)'],['선별','var(--sel)']].map(([t,c])=>(
                        <div key={t} className="chart-bar" title={`${m.month} ${t}: ${fmt(m[t]||0)}`}
                          style={{height:Math.round((m[t]||0)/shownMax*114)+3+'px',background:c,position:'relative'}}>
                          {t==='산란'&&m.산란>0&&<span style={{position:'absolute',bottom:3,left:'50%',transform:'translateX(-50%)',writingMode:'vertical-rl',fontSize:9,fontWeight:800,color:'#fff',letterSpacing:'-.5px',textShadow:'0 1px 2px rgba(0,0,0,.25)'}}>{fmt(m.산란)}</span>}
                        </div>
                      ))}
                    </div>
                    <div className="chart-x">{m.month.slice(5)}</div>
                    <div style={{fontSize:10,color:'var(--tx2)',fontWeight:700,textAlign:'center',marginTop:1}} title={`${m.month} 월말 누적재고`}>{fmt(m.cum)}</div>
                  </div>
                ))}
              </div></div>
            </div>
          )}

          <BatchRates entries={entries} year={yr}/>
        </>)}

        {/* ── 이력 ── */}
        {tab==='hist'&&(<>
          <div className="tab-inner" style={{marginBottom:10}}>
            <button className={`ti-btn${histView==='all'?' on-san':''}`} onClick={()=>setHistView('all')}>📋 전체이력</button>
            <button className={`ti-btn${histView==='batch'?' on-san':''}`} onClick={()=>setHistView('batch')}>📊 배치현황</button>
          </div>
          {years.length>1&&(
            <div className="fbar" style={{marginBottom:10}}>
              <span style={{padding:'0 6px 0 2px',color:'var(--tx3)',fontSize:13,fontWeight:700}}>연도</span>
              {['전체',...years].map(y=><button key={y} className={`fbtn${yr===y?' on':''}`} onClick={()=>setYr(y)}>{y==='전체'?'전체':y+'년'}</button>)}
            </div>
          )}
          {histView==='batch'&&<SanBatchView entries={entries} year={yr}/>}
          {histView==='all'&&(<>
            <div className="fbar">
              {[['전체','전체'],['산란','산란세팅'],['선별','사육세팅'],['폐기','산란폐기']].map(([v,lbl])=><button key={v} className={`fbtn${hf===v?' on':''}`} onClick={()=>setHf(v)}>{lbl}</button>)}
              <span style={{padding:'0 4px',color:'var(--tx3)'}}>|</span>
              {['전체',...SAN_RO].map(r=><button key={r} className={`fbtn${hr===(r==='전체'?'':r)?' on':''}`} onClick={()=>setHr(r==='전체'?'':r)}>{r}</button>)}
            </div>
            <div className="cn">{filtEntries.length}건 표시 (전체 {entries.length}건)</div>
            {filtEntries.map(e=>(
              <div key={e.id} className="hi">
                <span className="hi-dt"><span className="hi-yr">{e.date.slice(0,4)}</span><span className="hi-md">{e.date.slice(5).replace('-','/')}</span></span>
                <span className="hi-rm">{e.room}</span>
                <span className={`hi-b ${typeBadge(e.type)}`}>{typeLabel(e.type)}</span>
                <span className="hi-a">{fmt(e.amount)}</span>
                {isAdmin&&<><button className="edit-btn" onClick={()=>setEditEntry(e)}><i className="ti ti-pencil"/></button><button className="del" onClick={()=>delEntry(e.id)}><i className="ti ti-x"/></button></>}
              </div>
            ))}
          </>)}
        </>)}

      </div>

      <div className="tabs">
        {TABS.map(([t,ic,lbl])=>(
          <button key={t} className={`tab${tab===t?' on':''}`} onClick={()=>{setTab(t);localStorage.setItem('db_tab',t);}}>
            <i className={`ti ${ic}`}/>{lbl}
          </button>
        ))}
      </div>
    </div>
  );
}

try{ReactDOM.createRoot(document.getElementById('root')).render(<App/>);}
catch(err){document.getElementById('root').innerHTML='<div style="padding:20px;color:red;font-family:monospace;font-size:14px">오류: '+err.message+'</div>';console.error(err);}



</script>
</body>
</html>
